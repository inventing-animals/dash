name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Dash.Client/Dash.Client.csproj

      - name: Build
        run: dotnet build src/Dash.Client/Dash.Client.csproj --no-restore -c Release

      - name: Test
        run: |
          TEST_PROJECTS=$(find . -name "*.Tests.csproj" -not -path "*/bin/*" -not -path "*/obj/*")
          if [ -n "$TEST_PROJECTS" ]; then
            echo "$TEST_PROJECTS" | xargs dotnet test -c Release
          else
            echo "No test projects found, skipping tests."
          fi

  deploy-pages:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build docs site
        run: docfx docs/docfx.json

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Publish WASM demo
        run: dotnet publish src/Dash.Client.Browser/Dash.Client.Browser.csproj -c Release -o ./wasm-out

      - name: Copy WASM demo into docs site
        run: |
          mkdir -p ./docs/_site/demo
          cp -r ./wasm-out/wwwroot/. ./docs/_site/demo/

      - name: Add .nojekyll
        run: touch ./docs/_site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
